<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Minhas Finanças</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-blue-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
      <!-- Header -->
      <div class="bg-gradient-to-r from-indigo-600 to-indigo-500 px-8 py-8 text-center">
        <div class="text-5xl mb-3">💰</div>
        <h1 class="text-2xl font-bold text-white">Minhas Finanças</h1>
        <p class="text-indigo-200 text-sm mt-1">Gestão financeira pessoal</p>
      </div>

      <!-- Form -->
      <div class="px-8 py-8">
        {% if error %}
        <div class="mb-5 flex items-start gap-2 px-4 py-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm">
          <i data-lucide="alert-circle" class="w-4 h-4 mt-0.5 flex-shrink-0"></i>
          {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/auth/login" class="space-y-5">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
            <div class="relative">
              <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
              <input
                type="email" id="email" name="email" required autocomplete="email"
                placeholder="seu@email.com"
                class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl text-sm
                       focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none
                       transition-colors"
              >
            </div>
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Senha</label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
              <input
                type="password" id="password" name="password" required autocomplete="current-password"
                placeholder="••••••••"
                class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl text-sm
                       focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none
                       transition-colors"
              >
            </div>
          </div>

          <button
            type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl text-sm
                   transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
            Entrar
          </button>
        </form>
      </div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-4">
      Sistema de uso pessoal — acesso restrito
    </p>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
